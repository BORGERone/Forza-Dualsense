<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forza DualSense</title>
</head>
<body>
    <div class="background-image"></div>
    <div class="vignette"></div>
    <div class="gradient-overlay"></div>
    
    <div class="titlebar" data-tauri-drag-region>
        <div class="titlebar-title">FORZA DUALSENSE</div>
        <div class="window-controls">
            <button id="minimize-btn" data-tauri-drag-region="false">_</button>
            <button id="maximize-btn" data-tauri-drag-region="false">□</button>
            <button id="close-btn" class="close-btn" data-tauri-drag-region="false">×</button>
        </div>
    </div>
    
    <div class="main-container">
        <div class="left-panel">
            <div class="title-label">
                <h3 data-i18n="controls">Controls</h3>
            </div>
            
            <div class="panel">
                <div class="controls">
                    <button id="start-btn" data-i18n="start">Start</button>
                    <div style="margin-top: 15px;">
                        <label data-i18n="forza-path" style="color: rgba(255, 255, 255, 0.7); font-size: 0.85em; display: block; margin-bottom: 8px;">Forza Horizon 6 Path</label>
                        <div style="display: flex; gap: 8px; align-items: center; max-width: 100%;">
                            <input type="text" id="forza-path-input" class="styled-input" placeholder="C:\\Games\\ForzaHorizon6\\ForzaHorizon6.exe" style="font-size: 0.85em; flex: 1; min-width: 0;">
                            <button id="select-forza-btn" class="browse-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="status-section">
                    <h4 data-i18n="status">Status</h4>
                    <div class="status-bar">
                        <div class="status-bar-item disconnected" id="dualsense-status">
                            <span data-i18n="dualsense">DualSense</span>
                            <span data-i18n="dualsense-disconnected">Disconnected</span>
                        </div>
                        <div class="status-bar-item" id="game-status">
                            <span data-i18n="game">Game</span>
                            <span data-i18n="game-not-detected">Not Detected</span>
                        </div>
                        <div class="status-bar-item" id="udp-status">
                            <span data-i18n="udp">UDP</span>
                            <span data-i18n="udp-not-listening">Not Listening</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="title-label">
                <h3 data-i18n="settings">Settings</h3>
            </div>
            
            <div class="panel">
                <div class="toggle-item">
                    <label data-i18n="language">Language</label>
                    <select id="language-select" class="styled-select">
                        <option value="en">English</option>
                        <option value="ru">Русский</option>
                    </select>
                </div>
                
                <div class="setting-item">
                    <label data-i18n="udp-port">UDP Port</label>
                    <input type="number" id="udp-port" min="1024" max="65535" value="5300" class="styled-input">
                </div>
                
                <div class="setting-item">
                    <label data-i18n="brake-deadzone">Brake Deadzone</label>
                    <div class="slider-container">
                        <input type="range" id="brake-deadzone" min="0" max="255" value="50">
                        <input type="number" class="slider-value-input" id="brake-deadzone-value" min="0" max="255" value="50">
                    </div>
                </div>
                
                <div class="setting-item">
                    <label data-i18n="brake-baseline-force">Brake Baseline Force</label>
                    <div class="slider-container">
                        <input type="range" id="brake-baseline-force" min="0" max="255" value="15">
                        <input type="number" class="slider-value-input" id="brake-baseline-force-value" min="0" max="255" value="15">
                    </div>
                </div>
                
                <div class="setting-item">
                    <label data-i18n="brake-max-force">Brake Max Force</label>
                    <div class="slider-container">
                        <input type="range" id="brake-max-force" min="0" max="255" value="60">
                        <input type="number" class="slider-value-input" id="brake-max-force-value" min="0" max="255" value="60">
                    </div>
                </div>
                
                <div class="toggle-item">
                    <label data-i18n="enable-brake-resistance">Enable Brake Resistance</label>
                    <input type="checkbox" id="enable-brake-resistance" checked>
                </div>
                
                <div class="toggle-item">
                    <label data-i18n="enable-throttle-resistance">Enable Throttle Resistance</label>
                    <input type="checkbox" id="enable-throttle-resistance" checked>
                </div>
                
                <div class="toggle-item">
                    <label data-i18n="enable-abs">Enable ABS</label>
                    <input type="checkbox" id="enable-abs" checked>
                </div>
                
                <div class="toggle-item">
                    <label data-i18n="enable-startup-pulse">Enable Startup Pulse</label>
                    <input type="checkbox" id="enable-startup-pulse" checked>
                </div>
                
                <div class="controls">
                    <div style="display: flex; gap: 10px;">
                        <button id="save-settings" data-i18n="save">Save</button>
                        <button id="reset-settings" data-i18n="reset">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <a id="github-link" href="https://github.com/BORGERone/Forza-Dualsense">
            <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span data-i18n="github-repo">GitHub Repository</span>
        </a>
    </div>
    
    <script type="module" src="/main.ts"></script>
    <script>
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });
    </script>
</body>
</html>
